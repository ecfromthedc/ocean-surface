<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#06111d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ocean" />
    <meta name="application-name" content="Ocean" />
    <title>Ocean</title>

    <!-- PWA manifest + icons (Trunk copies the public/ dir to dist root) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!--
      data-wasm-opt="0" — DO NOT REMOVE (OCEAN-121).
      Trunk's release pipeline auto-downloads & runs its own `wasm-opt`
      (binaryen). When that step fails — no network to fetch the binary, the
      fetched binary can't run, or the `--output` target dir is missing — trunk
      STILL reports "✅ success" but leaves a truncated / all-zero file in dist/.
      A real deploy then serves a blank page:
        CompileError: expected magic word 00 61 73 6d, found 00 00 00 00
      The wasm-bindgen output trunk produces *before* wasm-opt is already a
      valid, runnable module, so we disable wasm-opt to ship that instead. This
      makes `trunk build --release` produce a bootable bundle on any machine,
      with no dependency on wasm-opt being present or working.
      (run-surface.sh also asserts the dist wasm magic word as a build-guard.)
    -->
    <link data-trunk rel="rust" href="crates/ocean-surface-ui/Cargo.toml" data-bin="ocean-surface-ui" data-wasm-opt="0" />
    <link data-trunk rel="css" href="style.css" />
    <link data-trunk rel="copy-dir" href="public" data-target-path="." />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  </head>
  <body>
    <script>
      // --- Google Maps / Places UI Kit glue for the agent's `map` component ---
      // The WASM MapView calls window.oceanRenderMap(...). We lazily bootstrap
      // the Maps JS API once (with the key from /api/config), then render the
      // requested mode into the component's container using Places UI Kit web
      // components, and relay selections back to the agent via onEvent.
      (function () {
        let mapsReady = null; // Promise, set on first use

        function loadMaps(key) {
          if (mapsReady) return mapsReady;
          mapsReady = new Promise((resolve, reject) => {
            // Official inline bootstrap loader (dynamic library import).
            (g => {
              var h, a, k, p = "The Google Maps JavaScript API",
                  c = "google", l = "importLibrary", q = "__ib__",
                  m = document, b = window;
              b = b[c] || (b[c] = {});
              var d = b.maps || (b.maps = {}), r = new Set(),
                  e = new URLSearchParams(),
                  u = () => h || (h = new Promise(async (res, rej) => {
                    a = m.createElement("script");
                    e.set("libraries", [...r] + "");
                    for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]);
                    e.set("callback", c + ".maps." + q);
                    a.src = `https://maps.${c}apis.com/maps/api/js?` + e;
                    d[q] = res;
                    a.onerror = () => h = rej(Error(p + " could not load."));
                    a.nonce = m.querySelector("script[nonce]")?.nonce || "";
                    m.head.append(a);
                  }));
              d[l] ? console.warn(p + " only loads once. Ignoring:", g)
                   : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n));
            })({ key: key, v: "weekly" });
            // Resolve once the core library is importable.
            const t = setInterval(() => {
              if (window.google && google.maps && google.maps.importLibrary) {
                clearInterval(t); resolve();
              }
            }, 30);
            setTimeout(() => { clearInterval(t); reject(new Error("maps load timeout")); }, 15000);
          });
          return mapsReady;
        }

        function num(v, d) { return (typeof v === "number" && isFinite(v)) ? v : d; }

        window.oceanRenderMap = async function (containerId, key, mapId, propsJson, onEvent) {
          let props = {};
          try { props = JSON.parse(propsJson || "{}"); } catch (e) {}
          const el = document.getElementById(containerId);
          if (!el) return;
          if (!key) { el.innerHTML = '<div class="ocean-map__loading">map key not configured</div>'; return; }

          try {
            await loadMaps(key);
            await Promise.all([
              google.maps.importLibrary("maps"),
              google.maps.importLibrary("marker"),
              google.maps.importLibrary("places"),
            ]);
          } catch (e) {
            el.innerHTML = '<div class="ocean-map__loading">map failed to load</div>';
            return;
          }

          // Infer mode if not given.
          let mode = props.mode;
          if (!mode) {
            if (props.place_id) mode = "place";
            else if (props.query || props.nearby) mode = "search";
            else mode = "markers";
          }

          el.innerHTML = ""; // clear loading/prev

          if (mode === "place" && props.place_id) {
            const details = document.createElement("gmp-place-details");
            details.innerHTML =
              `<gmp-place-details-place-request place="${props.place_id}"></gmp-place-details-place-request>` +
              `<gmp-place-all-content></gmp-place-all-content>`;
            el.appendChild(details);
            return;
          }

          // Markers + search both render a map; search adds a place list.
          const center = props.center || { lat: 39.5, lng: -98.35 };
          const mapEl = document.createElement("gmp-map");
          mapEl.setAttribute("center", `${num(center.lat, 39.5)},${num(center.lng, -98.35)}`);
          mapEl.setAttribute("zoom", String(num(props.zoom, 10)));
          mapEl.setAttribute("map-id", mapId || "DEMO_MAP_ID");
          mapEl.style.width = "100%";
          mapEl.style.height = "100%";
          el.appendChild(mapEl);

          // <gmp-map> is a web component wrapper. AdvancedMarkerElement needs the
          // underlying google.maps.Map instance (`innerMap`), not the DOM element.
          // If we attach markers to the element itself they silently don't render.
          await customElements.whenDefined("gmp-map");
          const innerMap = mapEl.innerMap || mapEl.map || null;

          const { AdvancedMarkerElement, PinElement } = google.maps.marker;
          const bounds = new google.maps.LatLngBounds();
          let hasPts = false;

          (props.markers || []).forEach((mk, i) => {
            if (typeof mk.lat !== "number" || typeof mk.lng !== "number") return;
            const label = mk.label ? String(mk.label) : String(i + 1);
            const pin = PinElement
              ? new PinElement({ glyph: label, glyphColor: "#ffffff", background: "#1d9bf0", borderColor: "#ffffff" })
              : null;
            const marker = new AdvancedMarkerElement({
              map: innerMap,
              position: { lat: mk.lat, lng: mk.lng },
              title: mk.title || "",
              content: pin ? pin.element : undefined,
            });
            marker.addListener("click", () => {
              onEvent && onEvent("marker_clicked", JSON.stringify({ index: i, title: mk.title || "" }));
            });
            bounds.extend({ lat: mk.lat, lng: mk.lng });
            hasPts = true;
          });

          if (mode === "search") {
            const search = document.createElement("gmp-place-search");
            search.setAttribute("selectable", "");
            search.setAttribute("orientation", "vertical");
            if (props.query) {
              search.innerHTML =
                `<gmp-place-all-content></gmp-place-all-content>` +
                `<gmp-place-text-search-request text-query="${(props.query + "").replace(/"/g, "&quot;")}" max-result-count="10"></gmp-place-text-search-request>`;
            } else if (props.nearby) {
              const n = props.nearby;
              search.innerHTML =
                `<gmp-place-all-content></gmp-place-all-content>` +
                `<gmp-place-nearby-search-request max-result-count="10"></gmp-place-nearby-search-request>`;
            }
            search.addEventListener("gmp-select", (ev) => {
              const place = ev.place || {};
              onEvent && onEvent("place_selected", JSON.stringify({
                place_id: place.id || "", name: place.displayName || "",
              }));
            });
            // Place the search list in an overlay panel over the map.
            const panel = document.createElement("div");
            panel.className = "ocean-map__panel";
            panel.appendChild(search);
            el.appendChild(panel);
          }

          if (props.fit_markers && hasPts) {
            innerMap && innerMap.fitBounds(bounds);
          }
        };
      })();

      // --- TikTok / Instagram video embeds for the `video` component ---
      (function () {
        function loadScript(src, opts = {}) {
          return new Promise((resolve) => {
            // Some social embed scripts (notably TikTok) only scan the document
            // during script execution. If we reuse the existing tag, newly
            // inserted blockquotes can remain as half-rendered placeholders.
            // `reload: true` forces a fresh execution after we inject markup.
            if (!opts.reload && [...document.scripts].some(s => s.src && s.src.indexOf(src) !== -1)) {
              resolve(); return;
            }
            if (opts.reload) {
              [...document.scripts]
                .filter(s => s.src && s.src.indexOf(src) !== -1)
                .forEach(s => s.remove());
            }
            const s = document.createElement('script');
            s.async = true;
            s.src = opts.reload ? `${src}${src.includes('?') ? '&' : '?'}ocean=${Date.now()}` : src;
            s.onload = () => resolve();
            s.onerror = () => resolve();
            document.body.appendChild(s);
          });
        }

        window.oceanRenderSocialVideo = async function (containerId, platform, url) {
          const el = document.getElementById(containerId);
          if (!el) return;
          const rawUrl = (url || '').trim();
          const safe = rawUrl.replace(/"/g, '&quot;');

          if (platform === 'tiktok') {
            // Extract the numeric video id if present for a cleaner embed.
            const m = rawUrl.match(/\/video\/(\d+)/);
            const vid = m ? m[1] : '';
            el.innerHTML =
              `<blockquote class="tiktok-embed" cite="${safe}"${vid ? ` data-video-id="${vid}"` : ''} style="max-width:605px;min-width:280px;margin:0 auto;">` +
              `<section><a target="_blank" rel="noopener" href="${safe}">${safe}</a></section></blockquote>`;
            await loadScript('https://www.tiktok.com/embed.js', { reload: true });
          } else if (platform === 'instagram') {
            el.innerHTML =
              `<blockquote class="instagram-media" data-instgrm-permalink="${safe}" data-instgrm-version="14" style="margin:0;max-width:540px;width:100%;">` +
              `<a href="${safe}">${safe}</a></blockquote>`;
            await loadScript('https://www.instagram.com/embed.js');
            if (window.instgrm && window.instgrm.Embeds) {
              window.instgrm.Embeds.process();
            }
          }
        };
      })();

      // --- LiveKit web participation (OCEAN-83) ---
      // The WASM LiveKitPanel drives an actual room connection through this
      // bridge. The token flow (proxy → daemon mints a JWT) is unchanged; this
      // only adds *participation* on top: connect with the existing token,
      // toggle local mic/camera tracks, and surface the participant roster.
      //
      // We load the official `livekit-client` SDK as an ESM module from a CDN
      // (matching how the Maps / TikTok / Instagram embeds are loaded here —
      // no bundler in the Trunk pipeline). The module is fetched once, lazily,
      // on first connect.
      (function () {
        const LIVEKIT_ESM =
          'https://cdn.jsdelivr.net/npm/livekit-client@2.7.5/+esm';
        let sdkPromise = null; // Promise<LiveKitModule>
        let LKMod = null;      // resolved livekit-client module (for enums)
        let room = null;       // active Room instance (one room per surface)
        let onParticipants = null; // (json) => void  callback into WASM

        // --- Remote media registry (OCEAN-88) ---------------------------------
        // Video attachment is inherently JS-side: the SDK hands us MediaStream
        // tracks that must be `track.attach()`-ed to live <video>/<audio> DOM
        // nodes. The WASM grid renders a per-participant tile container with a
        // stable id (`lk-tile-<identity>`); JS owns the <video> inside it.
        //
        // Two registries keep DOM and tracks in sync regardless of ordering
        // (a track can subscribe before its tile renders, or after):
        //   videoTracks: identity -> RemoteVideoTrack   (the camera/screen feed)
        //   audioEls:    trackSid  -> HTMLAudioElement   (kept alive so we hear)
        const videoTracks = new Map();
        const audioEls = new Map();

        function tileEl(identity) {
          return document.getElementById('lk-tile-' + identity);
        }

        // (Re)attach the current remote video for `identity` into its tile, if
        // both the track and the container DOM exist. Idempotent — replaces any
        // stale <video> so re-renders / late subscribes both converge.
        function attachVideo(identity) {
          const el = tileEl(identity);
          const track = videoTracks.get(identity);
          if (!el) return; // tile not rendered yet; will retry on mount/emit
          const prev = el.querySelector('video');
          if (!track) {
            if (prev) { try { prev.remove(); } catch (e) {} }
            return;
          }
          // If a <video> for this exact track is already mounted, leave it.
          if (prev && prev.__lkSid === track.sid) return;
          if (prev) { try { prev.remove(); } catch (e) {} }
          const v = track.attach(); // SDK returns a wired-up <video>
          v.__lkSid = track.sid;
          v.autoplay = true;
          v.playsInline = true;
          v.muted = true; // video element muted; audio plays via audioEls
          v.className = 'ocean-livekit__video';
          el.appendChild(v);
        }

        function detachVideo(identity) {
          videoTracks.delete(identity);
          const el = tileEl(identity);
          if (el) {
            const v = el.querySelector('video');
            if (v) { try { v.remove(); } catch (e) {} }
          }
        }

        // Tear down every attached media element + clear the registries. Used on
        // disconnect and on reconnect (the SDK resubscribes from scratch).
        function clearMedia() {
          videoTracks.forEach((_t, identity) => {
            const el = tileEl(identity);
            if (el) { const v = el.querySelector('video'); if (v) { try { v.remove(); } catch (e) {} } }
          });
          videoTracks.clear();
          audioEls.forEach((a) => {
            try { a.pause(); a.srcObject = null; a.remove(); } catch (e) {}
          });
          audioEls.clear();
        }

        function loadSdk() {
          if (sdkPromise) return sdkPromise;
          sdkPromise = import(/* @vite-ignore */ LIVEKIT_ESM)
            .then((m) => { LKMod = m; return m; })
            .catch((e) => {
              sdkPromise = null; // allow retry on a later connect
              throw e;
            });
          return sdkPromise;
        }

        // Build the participant roster payload the WASM side renders. Includes
        // the local participant first, then remotes, with mic/camera state and
        // a `hasVideo` flag so the grid knows whether to draw a <video> tile.
        function snapshot() {
          if (!room) return [];
          const out = [];
          const lp = room.localParticipant;
          if (lp) {
            out.push({
              identity: lp.identity || 'me',
              name: lp.name || lp.identity || 'me',
              local: true,
              mic: lp.isMicrophoneEnabled === true,
              camera: lp.isCameraEnabled === true,
              speaking: lp.isSpeaking === true,
              has_video: false, // local self-view is not rendered as a tile
            });
          }
          room.remoteParticipants.forEach((p) => {
            out.push({
              identity: p.identity,
              name: p.name || p.identity,
              local: false,
              mic: p.isMicrophoneEnabled === true,
              camera: p.isCameraEnabled === true,
              speaking: p.isSpeaking === true,
              has_video: videoTracks.has(p.identity),
            });
          });
          return out;
        }

        function emit() {
          if (onParticipants) {
            try { onParticipants(JSON.stringify(snapshot())); } catch (e) {}
          }
          // After WASM re-renders tiles in response to this snapshot, make sure
          // every known remote video is mounted into its (possibly new) tile.
          // requestAnimationFrame lets the Leptos render flush first.
          try {
            requestAnimationFrame(() => {
              videoTracks.forEach((_t, identity) => attachVideo(identity));
            });
          } catch (e) {
            videoTracks.forEach((_t, identity) => attachVideo(identity));
          }
        }

        // Wire RoomEvent handlers for one Room instance. Pulled out so both the
        // initial connect and (defensively) reconnect share identical wiring.
        function wireRoom(LK, r) {
          const refresh = () => emit();
          r.on(LK.RoomEvent.ParticipantConnected, refresh)
            .on(LK.RoomEvent.ParticipantDisconnected, (p) => {
              if (p && p.identity) detachVideo(p.identity);
              refresh();
            })
            .on(LK.RoomEvent.TrackMuted, refresh)
            .on(LK.RoomEvent.TrackUnmuted, refresh)
            .on(LK.RoomEvent.LocalTrackPublished, refresh)
            .on(LK.RoomEvent.LocalTrackUnpublished, refresh)
            .on(LK.RoomEvent.ActiveSpeakersChanged, refresh)
            // --- Remote tracks (OCEAN-88) ---
            .on(LK.RoomEvent.TrackSubscribed, (track, _pub, participant) => {
              const id = participant && participant.identity;
              if (!id) return;
              if (track.kind === LK.Track.Kind.Video) {
                videoTracks.set(id, track);
                attachVideo(id);
              } else if (track.kind === LK.Track.Kind.Audio) {
                // Attach audio to a detached element so remote audio is audible.
                const a = track.attach();
                a.autoplay = true;
                audioEls.set(track.sid, a);
              }
              refresh();
            })
            .on(LK.RoomEvent.TrackUnsubscribed, (track, _pub, participant) => {
              const id = participant && participant.identity;
              if (track.kind === LK.Track.Kind.Video) {
                if (id) detachVideo(id);
                try { track.detach().forEach((el) => el.remove()); } catch (e) {}
              } else if (track.kind === LK.Track.Kind.Audio) {
                const a = audioEls.get(track.sid);
                if (a) { try { a.pause(); a.srcObject = null; a.remove(); } catch (e) {} }
                audioEls.delete(track.sid);
                try { track.detach().forEach((el) => el.remove()); } catch (e) {}
              }
              refresh();
            })
            // --- Reconnect lifecycle (OCEAN-88) ---
            // On a drop the SDK keeps the Room object and resubscribes on its
            // own once back. Clear stale media so we don't show frozen frames,
            // surface a "reconnecting" status, then refresh once restored.
            .on(LK.RoomEvent.Reconnecting, () => {
              clearMedia();
              if (onParticipants) {
                try { onParticipants(JSON.stringify({ status: 'reconnecting' })); } catch (e) {}
              }
            })
            .on(LK.RoomEvent.Reconnected, () => {
              // Tracks are resubscribed by the SDK, re-firing TrackSubscribed.
              emit();
            })
            .on(LK.RoomEvent.Disconnected, () => {
              clearMedia();
              room = null;
              if (onParticipants) { try { onParticipants('[]'); } catch (e) {} }
            });
        }

        // Connect to the room. `tokenPath` is the same-origin proxy path that
        // mints a JWT (POST → { ok, url, room, token }). `participantId` /
        // `displayName` identify this surface. Resolves to a JSON status the
        // WASM side awaits: { ok, room?, error? }.
        window.oceanLiveKitConnect = async function (
          tokenPath, surfaceId, participantId, displayName, participantsCb
        ) {
          onParticipants = participantsCb || null;
          try {
            // 1) Mint a token via the existing (working) token flow.
            //
            // `cache: 'no-store'` is load-bearing (OCEAN-123): a misbehaving
            // service worker (OCEAN-122) could otherwise satisfy this POST from
            // a stale earlier response, so the surfaced status code read back as
            // the cached value (e.g. 404) instead of the live upstream one
            // (e.g. 503 — daemon: LiveKit not configured). Forcing the live
            // network response guarantees `resp.status` is the real code.
            const resp = await fetch(tokenPath, {
              method: 'POST',
              cache: 'no-store',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                surface_id: surfaceId || 'web-surface',
                participant_id: participantId || 'web-surface',
                display_name: displayName || 'Web Surface',
                can_publish: true,
                can_subscribe: true,
              }),
            });
            if (!resp.ok) {
              // `resp.status` is the live upstream code now that the fetch is
              // no-store (e.g. 503 when the daemon has LiveKit unconfigured),
              // not a stale cached 404.
              return JSON.stringify({ ok: false, error: 'token request failed (' + resp.status + ')' });
            }
            const cred = await resp.json();
            if (!cred || cred.ok === false || !cred.token || !cred.url) {
              return JSON.stringify({ ok: false, error: (cred && cred.error) || 'token denied' });
            }

            // 2) Load the SDK and open the room.
            const LK = await loadSdk();
            // Clean up any stale room before opening a new one.
            if (room) { try { await room.disconnect(); } catch (e) {} room = null; }
            clearMedia();
            room = new LK.Room({ adaptiveStream: true, dynacast: true });
            wireRoom(LK, room);

            await room.connect(cred.url, cred.token);
            emit();
            return JSON.stringify({ ok: true, room: cred.room || room.name || '' });
          } catch (e) {
            if (room) { try { await room.disconnect(); } catch (_) {} room = null; }
            clearMedia();
            return JSON.stringify({ ok: false, error: String(e && e.message ? e.message : e) });
          }
        };

        // Leave the room cleanly. Local tracks are stopped by disconnect().
        window.oceanLiveKitDisconnect = async function () {
          clearMedia();
          if (!room) return JSON.stringify({ ok: true });
          try { await room.disconnect(); } catch (e) {}
          room = null;
          return JSON.stringify({ ok: true });
        };

        // Called by the WASM grid when a tile container mounts (per remote
        // participant). Attaches any already-subscribed video into the fresh
        // DOM node — covers the track-before-tile ordering.
        window.oceanLiveKitAttachTile = function (identity) {
          if (identity) attachVideo(identity);
        };

        // Toggle the local microphone track. Returns the resulting state.
        window.oceanLiveKitSetMic = async function (enabled) {
          if (!room || !room.localParticipant) {
            return JSON.stringify({ ok: false, mic: false });
          }
          try {
            await room.localParticipant.setMicrophoneEnabled(enabled === true);
          } catch (e) {
            return JSON.stringify({ ok: false, mic: room.localParticipant.isMicrophoneEnabled === true, error: String(e) });
          }
          emit();
          return JSON.stringify({ ok: true, mic: room.localParticipant.isMicrophoneEnabled === true });
        };

        // Toggle the local camera track. Returns the resulting state.
        window.oceanLiveKitSetCamera = async function (enabled) {
          if (!room || !room.localParticipant) {
            return JSON.stringify({ ok: false, camera: false });
          }
          try {
            await room.localParticipant.setCameraEnabled(enabled === true);
          } catch (e) {
            return JSON.stringify({ ok: false, camera: room.localParticipant.isCameraEnabled === true, error: String(e) });
          }
          emit();
          return JSON.stringify({ ok: true, camera: room.localParticipant.isCameraEnabled === true });
        };
      })();

      // Register the service worker — required for Chrome's installable-PWA
      // criteria. Registered at root scope so it controls the whole app.
      //
      // Self-healing update path (OCEAN — "blank pane / 11-minute load"): a
      // wedged old worker used to keep controlling the page and never hand off
      // to a fresh deploy, pinning a stale shell. We now:
      //   1. Reload once when a NEW worker takes control
      //      (`controllerchange`) — but only after the page already had a
      //      controller, so the very first install doesn't trigger a reload
      //      loop.
      //   2. Also listen for the worker's explicit SW_ACTIVATED message as a
      //      belt-and-suspenders trigger.
      //   3. Poll for updates on load + when the tab regains focus, so a deploy
      //      is picked up promptly without a manual cache-clear.
      if ('serviceWorker' in navigator) {
        let reloading = false;
        const hadController = !!navigator.serviceWorker.controller;

        const reloadOnce = () => {
          if (reloading) return;
          reloading = true;
          window.location.reload();
        };

        // A brand-new worker has taken control of this page → load the fresh
        // shell. Guard against the first-ever install (no prior controller) so
        // we don't reload on initial registration.
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (hadController) reloadOnce();
        });

        // Explicit signal from the activated worker (covers cases where
        // controllerchange is suppressed, e.g. some PWA launch contexts).
        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data && event.data.type === 'SW_ACTIVATED' && hadController) {
            reloadOnce();
          }
        });

        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => {
              // Check for a new worker on load, and again whenever the tab
              // regains focus, so a fresh deploy heals quickly.
              reg.update().catch(() => {});
              document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                  reg.update().catch(() => {});
                }
              });
            })
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
