<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#06111d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ocean" />
    <meta name="application-name" content="Ocean" />
    <title>Ocean</title>

    <!-- PWA manifest + icons (Trunk copies the public/ dir to dist root) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link data-trunk rel="rust" href="crates/ocean-surface-ui/Cargo.toml" data-bin="ocean-surface-ui" />
    <link data-trunk rel="css" href="style.css" />
    <link data-trunk rel="copy-dir" href="public" data-target-path="." />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  </head>
  <body>
    <script>
      // Register the service worker — required for Chrome's installable-PWA
      // criteria. Registered at root scope so it controls the whole app.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
